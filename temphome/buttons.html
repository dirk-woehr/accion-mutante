<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Liquid Glass Social Buttons Advanced</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #1e1e2f, #0a0a0f);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .socials {
    display: flex;
    gap: 25px;
  }

  .btn {
    position: relative;
    width: 75px;
    height: 75px;
    border-radius: 22px;
    backdrop-filter: blur(18px) saturate(160%);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.25),
      0 15px 35px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
  }

  /* dynamischer Glanz */
  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(
      circle at var(--x, 50%) var(--y, 50%),
      rgba(255,255,255,0.35),
      transparent 60%
    );
    opacity: 0.6;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .btn:hover::before {
    opacity: 1;
  }

  .btn:hover {
    transform: translateY(-8px) scale(1.07);
    box-shadow:
      inset 0 1px 3px rgba(255,255,255,0.35),
      0 25px 50px rgba(0,0,0,0.7);
  }

  .btn svg {
    width: 30px;
    height: 30px;
    fill: white;
    opacity: 0.95;
    z-index: 1;
  }

  /* Tooltips */
  .btn::after {
    content: attr(data-label);
    position: absolute;
    bottom: -35px;
    font-size: 13px;
    color: #ddd;
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.2s ease;
    pointer-events: none;
  }

  .btn:hover::after {
    opacity: 1;
    transform: translateY(0);
  }

  /* Plattformfarben */
  .facebook:hover {
    background: rgba(24,119,242,0.25);
  }

  .instagram:hover {
    background: linear-gradient(
      45deg,
      rgba(240,148,51,0.3),
      rgba(230,104,60,0.3),
      rgba(220,39,67,0.3),
      rgba(204,35,102,0.3),
      rgba(188,24,136,0.3)
    );
  }

  .bandcamp:hover {
    background: rgba(98,196,255,0.25);
  }

</style>
</head>

<body>

<div class="socials">

  <!-- Facebook -->
  <a href="https://facebook.com" target="_blank" class="btn facebook" data-label="Facebook">
    <svg viewBox="0 0 24 24">
      <path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-3.9 3.8-3.9
      1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.5V12H17l-.4 3h-2.7v7A10
      10 0 0 0 22 12z"/>
    </svg>
  </a>

  <!-- Instagram -->
  <a href="https://instagram.com" target="_blank" class="btn instagram" data-label="Instagram">
    <svg viewBox="0 0 24 24">
      <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2
      5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm6.5-.9a1.2
      1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z"/>
    </svg>
  </a>

  <!-- Bandcamp -->
  <a href="https://bandcamp.com" target="_blank" class="btn bandcamp" data-label="Bandcamp">
    <svg viewBox="0 0 24 24">
      <path d="M2 18h13l7-12H9L2 18z"/>
    </svg>
  </a>

</div>

<script>
  const buttons = document.querySelectorAll(".btn");

  buttons.forEach(btn => {
    btn.addEventListener("mousemove", e => {
      const rect = btn.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      btn.style.setProperty("--x", x + "%");
      btn.style.setProperty("--y", y + "%");
    });
  });
</script>

</body>
</html>
