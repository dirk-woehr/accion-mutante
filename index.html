<!DOCTYPE html>
<html lang="en">
<head>
  <!-- meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Rubik+Glitch&display=swap" rel="stylesheet">
  <!-- Global JS -->
  <script src="js/page_template.js"></script>
  <script src="js/disclaimer.js"></script>
  <script type="module" src="js/global.js"></script>
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/gigs.css" />
  <script type="module" src="js/main_section_home.js"></script>
  <title>Accion Mutante - Home</title>
</head>
<body id="home">
  <div id="pageContainer">
    <header-section id="header"></header-section>
    <menu-section id="menu"></menu-section>
    <main-section id="mainSection"></main-section>
    <disclaimer-section id="disclaimer"></disclaimer-section>
  </div>
  <input type="color" name="colorPickerBG" id="colorPickerBG" value="rgb(43, 66, 89)" style="position: fixed; top: 10px; right: 10px;">
  <script>
    const colorPickerBG = document.getElementById("colorPickerBG");
    colorPickerBG.addEventListener("input", (event) => {
      const selectedColor = event.target.value.replace('#', '');

      const r = parseInt(selectedColor.substring(0, 2), 16);
      const g = parseInt(selectedColor.substring(2, 4), 16);
      const b = parseInt(selectedColor.substring(4, 6), 16);

      console.log({selectedColor, target: event.target});
      document.documentElement.style.setProperty('--background-color-rgb', [r,g,b].join(", "));
    });
  </script>
  <input type="color" name="colorPickerUI" id="colorPickerUI" value="rgb(105, 27, 27)" style="position: fixed; top: 10px; left: 10px;">
  <script>
    const colorPickerUI = document.getElementById("colorPickerUI");
    colorPickerUI.addEventListener("input", (event) => {
      const selectedColor = event.target.value.replace('#', '');

      const r = parseInt(selectedColor.substring(0, 2), 16);
      const g = parseInt(selectedColor.substring(2, 4), 16);
      const b = parseInt(selectedColor.substring(4, 6), 16);

      console.log({selectedColor, target: event.target});
      document.documentElement.style.setProperty('--ui-color-rgb', [r,g,b].join(", "));
    });
  </script>
</body>
</html>
